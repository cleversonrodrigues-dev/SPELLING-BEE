<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Spelling Bee</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins', sans-serif;

      background:#f7f7f7;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px;

    }

    .container{

      width:900px;

      background:white;

      border-radius:35px;

      padding:50px;

      box-shadow:
      0 15px 40px rgba(0,0,0,0.08);

    }

    h1{

      font-size:72px;

      color:#102b8c;

      text-align:center;

      margin-bottom:25px;

      font-weight:800;

      line-height:1;

    }

    .description{

      text-align:center;

      color:#5f6470;

      font-size:22px;

      line-height:1.7;

      margin-bottom:40px;

    }

    .description b{

      color:#102b8c;

    }

    .practice-box{

      background:#fff5d9;

      border:3px solid #ffd96d;

      border-radius:35px;

      padding:35px;

      background-image:
      radial-gradient(#ffe49b 10%, transparent 10%);

      background-size:35px 35px;

    }

    .label{

      color:#102b8c;

      font-size:24px;

      font-weight:700;

      margin-bottom:15px;

    }

    input{

      width:100%;

      height:95px;

      border-radius:28px;

      border:3px solid #d6dff2;

      font-size:48px;

      text-align:center;

      outline:none;

      margin-bottom:30px;

      font-family:'Poppins', sans-serif;

    }

    input:focus{

      border-color:#f7b500;

    }

    .buttons{

      display:flex;

      gap:18px;

      margin-bottom:25px;

    }

    button{

      flex:1;

      height:85px;

      border:none;

      border-radius:28px;

      font-size:28px;

      font-weight:700;

      cursor:pointer;

      transition:0.3s;

      font-family:'Poppins', sans-serif;

    }

    .blue{

      background:#102b8c;

      color:white;

    }

    .yellow{

      background:#ffb300;

      color:#102b8c;

      border:3px solid #102b8c;

    }

    button:hover{

      transform:translateY(-4px);

      box-shadow:
      0 10px 20px rgba(0,0,0,0.15);

    }

    .result{

      text-align:center;

      color:#102b8c;

      font-size:30px;

      font-weight:700;

      margin-top:10px;

    }

    .footer{

      text-align:center;

      margin-top:25px;

      color:#7c7c7c;

      font-size:18px;

    }

  </style>

</head>

<body>

  <div class="container">
<div style="text-align:center;">
    <img src="logo.png" width="280">
</div>

    <div class="description">

      Digite qualquer palavra em inglês e clique em
      <b>Pronunciation</b> para ouvir a palavra
      ou em <b>Spelling</b> para ouvir letra
      por letra no inglês americano.

    </div>

    <div class="practice-box">

      <div class="label">
        Type your word:
      </div>

      <input
        type="text"
        id="word"
        placeholder="Beautiful"
      >

      <div class="buttons">

        <button
          class="blue"
          onclick="pronounceWord()"
        >
          Pronunciation
        </button>

        <button
          class="yellow"
          onclick="spellWord()"
        >
          Spelling
        </button>

      </div>

      <div
        class="result"
        id="result"
      ></div>

      <div class="footer">
        Pronúncia em inglês americano.
      </div>

    </div>

  </div>

  <script>

    function pronounceWord(){

      let word =
      document.getElementById("word").value;

      document.getElementById("result")
      .innerHTML =
      "";

      let speech =
      new SpeechSynthesisUtterance(word);

      speech.lang = "en-US";

      speech.rate = 0.8;

      speech.pitch = 1;

      speechSynthesis.speak(speech);

    }

    function spellWord(){

      let word =
      document.getElementById("word").value;

      document.getElementById("result")
      .innerHTML =
      "Spelling: " + word.toUpperCase();

      let spelled =
      word.split("").join(" ... ");

      let speech =
      new SpeechSynthesisUtterance(spelled);

      speech.lang = "en-US";

      speech.rate = 0.6;

      speech.pitch = 1;

      speechSynthesis.speak(speech);

    }

  </script>

</body>

</html>
